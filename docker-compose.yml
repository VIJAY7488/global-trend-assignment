version: "3.9"

services:
  backend:
    build: ./backend
    container_name: task-manager-api
    ports:
      - "4000:4000"
    volumes:
      # Persist tasks.json across container restarts
      - task-data:/app/src/data
    environment:
      - PORT=4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: task-manager-ui
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  task-data:
